services:
  backend:
    image: book_shop:${IMAGE_TAG}
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - project-network
    depends_on:
      - db

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - project-network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/static
    depends_on:
      - backend
    networks:
      - project-network

volumes:
  postgres_data:
  static_volume:

networks:
  project-network: