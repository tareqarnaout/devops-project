name: Test Branch Pipeline (Image-First)

on:
  push:
    branches:
      - test

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build Fresh Artifact
        run: |
          cd book-shop
          export ARTIFACT_FILE="app-artifact.tar.gz"
          # ADDED: Tell tar to exclude the artifacts folder from the zip process
          tar --exclude='./artifacts' -czf artifacts/$ARTIFACT_FILE .
          echo "ARTIFACT_NAME=$ARTIFACT_FILE" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: book_shop
          IMAGE_TAG: test-${{ github.sha }} 
        # ADDED: Pass the ARTIFACT_NAME into Docker using --build-arg
        run: |
          cd book-shop
          docker build --build-arg ARTIFACT_NAME=${{ env.ARTIFACT_NAME }} -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Copy compose file to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # ADDED: Look inside the book-shop folder for the compose file
          source: "book-shop/docker-compose.yml"
          target: "/home/ubuntu/test_env/"
          strip_components: 1 # This stops it from creating a nested 'book-shop' folder on the server

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu 
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_URI
          script: |
            cd /home/ubuntu/test_env
            
            sed -i "s|image: .*book_shop.*|image: $IMAGE_URI|g" docker-compose.yml
            
            sed -i "s|\"80:80\"|\"8080:80\"|g" docker-compose.yml
            sed -i "s|- 80:80|- 8080:80|g" docker-compose.yml
            
            docker compose -p test down
            docker compose -p test up -d