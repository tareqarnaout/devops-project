name: dev pipeline

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: book-shop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          pip install poetry
          poetry self add poetry-plugin-export

      - name: Install dependencies into package folder
        run: |
          poetry export -f requirements.txt --output requirements.txt --without-hashes
          pip install -r requirements.txt --target=./app_package

      - name: Create artifact archive
        run: |
          mkdir -p artifacts
          tar -czf artifacts/app-${{ github.sha }}.tar.gz \
            app_package/ \
            books/ \
            book_shop/ \
            templates/ \
            manage.py \
            requirements.txt \
            book.json \
            users.json \
            nginx.conf

      - name: Commit artifact to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: add artifact for ${{ github.sha }}"
          file_pattern: book-shop/artifacts/app-*.tar.gz
          branch: dev

      - name: Build Docker image from artifact
        run: |
          docker build \
            --build-arg ARTIFACT_NAME=app-${{ github.sha }}.tar.gz \
            -t book_shop:${{ github.sha }} \
            .

      - name: Save Docker image
        run: |
          docker save book_shop:${{ github.sha }} | gzip > /tmp/book_shop.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ vars.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy image to EC2 via SCP
        run: |
          scp -i ~/.ssh/ec2_key.pem \
            /tmp/book_shop.tar.gz \
            ubuntu@${{ vars.EC2_HOST }}:/home/ubuntu/book_shop.tar.gz

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem ubuntu@${{ vars.EC2_HOST }} << 'ENDSSH'
            docker load -i /home/ubuntu/book_shop.tar.gz

            cd /home/ubuntu/devops-project
            git pull origin dev

            cat > book-shop/.env << EOF
            POSTGRES_DB=bookshop_db
            POSTGRES_USER=book_admin
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DJANGO_DEBUG=False
            DJANGO_ALLOWED_HOSTS=*
            IMAGE_TAG=${{ github.sha }}
            EOF

            cd book-shop
            
            sed -i "s|\"80:80\"|\"8090:80\"|g" docker-compose.yml
            sed -i "s|- 80:80|- 8090:80|g" docker-compose.yml
            
            docker compose -p dev down
            IMAGE_TAG=${{ github.sha }} docker compose -p dev up -d
          ENDSSH