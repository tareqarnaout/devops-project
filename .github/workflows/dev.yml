name: dev pipeline

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: book-shop  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          pip install poetry
          poetry self add poetry-plugin-export

      - name: Install dependencies into package folder
        run: |
          poetry export -f requirements.txt --output requirements.txt --without-hashes
          pip install -r requirements.txt --target=./app_package

      - name: Create artifact archive
        run: |
          mkdir -p artifacts
          tar -czf artifacts/app-${{ github.sha }}.tar.gz \
            app_package/ \
            books/ \
            book_shop/ \
            templates/ \
            manage.py \
            requirements.txt \
            book.json \
            users.json \
            nginx.conf

      - name: Commit artifact to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: add artifact for ${{ github.sha }}"
          file_pattern: book-shop/artifacts/app-*.tar.gz
          branch: dev

      - name: Build Docker image from artifact
        working-directory: book-shop
        run: |
          docker build \
            --build-arg ARTIFACT_NAME=app-${{ github.sha }}.tar.gz \
            -t book_shop:${{ github.sha }} \
            .

      - name: Save Docker image to file
        run: |
          docker save book_shop:${{ github.sha }} -o /tmp/book_shop.tar

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: /tmp/book_shop.tar
          target: /home/ubuntu/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DJANGO_SECRET_KEY,POSTGRES_PASSWORD
          script: |
            # Load the transferred image
            docker load -i /home/ubuntu/tmp/book_shop.tar

            cd /home/ubuntu/devops-project
            git pull origin dev

            # Create .env file
            cat > book-shop/.env << EOF
            POSTGRES_DB=bookshop_db
            POSTGRES_USER=book_admin
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            DJANGO_SECRET_KEY=$DJANGO_SECRET_KEY
            DJANGO_DEBUG=False
            DJANGO_ALLOWED_HOSTS=*
            IMAGE_TAG=${{ github.sha }}
            EOF

            cd book-shop
            export IMAGE_TAG=${{ github.sha }}
            docker compose -p dev down
            docker compose -p dev up -d