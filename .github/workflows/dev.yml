name: dev pipeline

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: book-shop  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          pip install poetry
          poetry self add poetry-plugin-export

      - name: Install dependencies into package folder
        run: |
          poetry export -f requirements.txt --output requirements.txt --without-hashes
          pip install -r requirements.txt --target=./app_package

      - name: Create artifact archive
        run: |
          mkdir -p artifacts
          tar -czf artifacts/app-${{ github.sha }}.tar.gz \
            app_package/ \
            books/ \
            book_shop/ \
            templates/ \
            manage.py \
            requirements.txt \
            book.json \
            users.json \
            nginx.conf

      - name: Commit artifact to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: add artifact for ${{ github.sha }}"
          file_pattern: book-shop/artifacts/app-*.tar.gz
          branch: dev

      - name: Build Docker image from artifact
        run: |
          docker build \
            --build-arg ARTIFACT_NAME=app-${{ github.sha }}.tar.gz \
            -t book_shop:${{ github.sha }} \
            .

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/devops-project/book-shop
            docker compose -p dev down
            docker compose -p dev up -d